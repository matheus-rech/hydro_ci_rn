name: Create Development Builds

jobs:
  android_dev:
    name: Build Android Dev
    type: build
    params:
      platform: android
      profile: development
  ios_device_dev:
    name: Build iOS Device Dev
    type: build
    params:
      platform: ios
      profile: development
  ios_simulator_dev:
    name: Build iOS Simulator Dev
    type: build
    params:
      platform: ios
      profile: development-simulator
